<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spill Awareness – Caswells Group</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --blue: #08488D;
    --blue-dark: #053769;
    --blue-light: #e8f0fa;
    --red: #EC1C24;
    --amber: #f59e0b;
    --green: #16a34a;
    --green-light: #dcfce7;
    --red-light: #fee2e2;
    --amber-light: #fef3c7;
    --white: #ffffff;
    --grey-50: #f8fafc;
    --grey-100: #f1f5f9;
    --grey-200: #e2e8f0;
    --grey-400: #94a3b8;
    --grey-600: #475569;
    --grey-800: #1e293b;
    --text: #1e293b;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(8,72,141,0.10);
    --shadow-lg: 0 6px 32px rgba(8,72,141,0.14);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Poppins', sans-serif;
    background: var(--grey-50);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  .app-header {
    background: var(--blue);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }
  .app-header svg { flex-shrink: 0; }
  .app-header-text h1 { color: #fff; font-size: 15px; font-weight: 700; line-height: 1.2; }
  .app-header-text p { color: rgba(255,255,255,0.72); font-size: 11.5px; font-weight: 400; }

  /* PROGRESS BAR */
  .progress-bar-wrap {
    background: var(--blue-dark);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .progress-bar-track {
    flex: 1;
    height: 5px;
    background: rgba(255,255,255,0.2);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: #fff;
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .progress-label { color: rgba(255,255,255,0.75); font-size: 11px; white-space: nowrap; }

  /* MAIN CARD */
  .main-card {
    max-width: 680px;
    margin: 28px auto 40px;
    padding: 0 16px;
  }
  .card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .card-hero {
    background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
    padding: 28px 28px 24px;
  }
  .card-hero .eyebrow {
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    margin-bottom: 8px;
  }
  .card-hero h2 {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    line-height: 1.25;
  }
  .card-hero p {
    color: rgba(255,255,255,0.8);
    font-size: 13px;
    margin-top: 8px;
    line-height: 1.6;
  }
  .card-body { padding: 24px 28px; }

  /* SITE SELECT */
  .site-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 8px; }
  .site-btn {
    border: 2px solid var(--grey-200);
    border-radius: var(--radius);
    padding: 18px 14px;
    cursor: pointer;
    background: var(--white);
    text-align: left;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
  }
  .site-btn:hover { border-color: var(--blue); background: var(--blue-light); }
  .site-btn.selected { border-color: var(--blue); background: var(--blue-light); box-shadow: 0 0 0 3px rgba(8,72,141,0.12); }
  .site-btn .site-icon { font-size: 28px; margin-bottom: 8px; }
  .site-btn .site-name { font-size: 13.5px; font-weight: 600; color: var(--blue); }
  .site-btn .site-addr { font-size: 11px; color: var(--grey-600); margin-top: 2px; line-height: 1.4; }

  /* LEARNER FORM */
  .form-row { margin-bottom: 16px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--grey-600); margin-bottom: 5px; display: block; }
  .form-input {
    width: 100%;
    border: 1.5px solid var(--grey-200);
    border-radius: 7px;
    padding: 10px 13px;
    font-family: 'Poppins', sans-serif;
    font-size: 13.5px;
    color: var(--text);
    background: var(--white);
    transition: border-color 0.15s;
  }
  .form-input:focus { outline: none; border-color: var(--blue); }

  /* LEARNING CONTENT */
  .section-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--blue);
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--blue-light);
  }
  .content-block { margin-bottom: 20px; }
  .content-block h4 { font-size: 13.5px; font-weight: 600; color: var(--grey-800); margin-bottom: 8px; }
  .content-block p, .content-block li { font-size: 13px; color: var(--grey-600); line-height: 1.65; }
  .content-block ul { padding-left: 18px; }
  .content-block li { margin-bottom: 5px; }

  /* HAZARD BADGES */
  .hazard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
  .hazard-card {
    border-radius: 8px;
    padding: 14px;
    border-left: 4px solid transparent;
  }
  .hazard-card.chemical { background: #fef2f2; border-color: var(--red); }
  .hazard-card.fuel { background: #fff7ed; border-color: #f97316; }
  .hazard-card.janitorial { background: #f0fdf4; border-color: var(--green); }
  .hazard-card.general { background: var(--blue-light); border-color: var(--blue); }
  .hazard-card .hc-icon { font-size: 22px; margin-bottom: 5px; }
  .hazard-card .hc-title { font-size: 12px; font-weight: 700; margin-bottom: 4px; }
  .hazard-card .hc-desc { font-size: 11.5px; line-height: 1.5; color: var(--grey-600); }

  /* RESPONSE STEPS */
  .steps-list { list-style: none; margin-bottom: 18px; }
  .step-item {
    display: flex;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid var(--grey-100);
  }
  .step-item:last-child { border-bottom: none; }
  .step-num {
    flex-shrink: 0;
    width: 34px;
    height: 34px;
    background: var(--blue);
    color: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
  }
  .step-content h4 { font-size: 13.5px; font-weight: 600; margin-bottom: 4px; }
  .step-content p { font-size: 12.5px; color: var(--grey-600); line-height: 1.6; }

  /* CALLOUT BOX */
  .callout {
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 12.5px;
    line-height: 1.6;
    margin-bottom: 18px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .callout.warning { background: var(--amber-light); border-left: 4px solid var(--amber); }
  .callout.danger { background: var(--red-light); border-left: 4px solid var(--red); }
  .callout.info { background: var(--blue-light); border-left: 4px solid var(--blue); }
  .callout.success { background: var(--green-light); border-left: 4px solid var(--green); }
  .callout-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .callout-text strong { display: block; font-size: 12.5px; font-weight: 600; margin-bottom: 3px; }

  /* SITE INFO TABLE */
  .info-table { width: 100%; border-collapse: collapse; font-size: 12.5px; margin-bottom: 14px; }
  .info-table th { background: var(--blue); color: #fff; padding: 8px 12px; text-align: left; font-weight: 600; }
  .info-table td { padding: 8px 12px; border-bottom: 1px solid var(--grey-100); color: var(--grey-600); }
  .info-table tr:last-child td { border-bottom: none; }
  .info-table td:first-child { font-weight: 600; color: var(--grey-800); }

  /* QUIZ */
  .quiz-q { margin-bottom: 24px; }
  .quiz-q-text { font-size: 13.5px; font-weight: 600; color: var(--grey-800); margin-bottom: 12px; line-height: 1.5; }
  .quiz-q-num { font-size: 10.5px; font-weight: 600; color: var(--blue); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 5px; }
  .quiz-options { display: flex; flex-direction: column; gap: 8px; }
  .quiz-opt {
    display: flex;
    align-items: center;
    gap: 10px;
    border: 1.5px solid var(--grey-200);
    border-radius: 7px;
    padding: 11px 14px;
    cursor: pointer;
    font-size: 13px;
    transition: border-color 0.12s, background 0.12s;
    background: var(--white);
  }
  .quiz-opt:hover { border-color: var(--blue); background: var(--blue-light); }
  .quiz-opt.selected { border-color: var(--blue); background: var(--blue-light); }
  .quiz-opt.correct { border-color: var(--green); background: var(--green-light); }
  .quiz-opt.incorrect { border-color: var(--red); background: var(--red-light); }
  .quiz-opt.reveal-correct { border-color: var(--green); background: var(--green-light); }
  .quiz-radio {
    width: 18px; height: 18px; flex-shrink: 0;
    border: 2px solid var(--grey-400);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .quiz-radio.filled { border-color: var(--blue); }
  .quiz-radio.filled::after { content: ''; width: 9px; height: 9px; border-radius: 50%; background: var(--blue); }
  .quiz-radio.correct-radio { border-color: var(--green); }
  .quiz-radio.correct-radio::after { content: ''; width: 9px; height: 9px; border-radius: 50%; background: var(--green); }
  .quiz-feedback { font-size: 12px; margin-top: 7px; padding: 8px 12px; border-radius: 6px; line-height: 1.5; }
  .quiz-feedback.correct { background: var(--green-light); color: #15803d; }
  .quiz-feedback.incorrect { background: var(--red-light); color: #b91c1c; }

  /* RESULTS */
  .result-score-ring {
    width: 110px; height: 110px;
    border-radius: 50%;
    margin: 0 auto 18px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-weight: 700;
    border: 6px solid;
  }
  .result-score-ring.pass { border-color: var(--green); color: var(--green); }
  .result-score-ring.fail { border-color: var(--red); color: var(--red); }
  .result-score-ring .score-pct { font-size: 28px; }
  .result-score-ring .score-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
  .result-text { text-align: center; margin-bottom: 22px; }
  .result-text h3 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
  .result-text p { font-size: 13px; color: var(--grey-600); }
  .result-breakdown { font-size: 12.5px; }
  .result-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--grey-100); }
  .result-row:last-child { border-bottom: none; }
  .result-row .rr-q { color: var(--grey-600); flex: 1; padding-right: 12px; }
  .result-row .rr-tick { font-size: 14px; }

  /* NAV BUTTONS */
  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 24px;
    padding-top: 18px;
    border-top: 1px solid var(--grey-100);
  }
  .btn {
    padding: 11px 22px;
    border-radius: 7px;
    font-family: 'Poppins', sans-serif;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--blue); color: #fff; }
  .btn-primary:hover { background: var(--blue-dark); }
  .btn-primary:disabled { background: var(--grey-400); cursor: not-allowed; transform: none; }
  .btn-secondary { background: var(--grey-100); color: var(--grey-800); }
  .btn-secondary:hover { background: var(--grey-200); }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-success { background: var(--green); color: #fff; }

  .status-msg { font-size: 12px; color: var(--grey-600); margin-top: 12px; text-align: center; font-style: italic; }
  .status-msg.sending { color: var(--blue); }
  .status-msg.sent { color: var(--green); font-style: normal; font-weight: 500; }
  .status-msg.error { color: var(--red); }

  @media (max-width: 480px) {
    .card-hero { padding: 22px 18px; }
    .card-body { padding: 18px; }
    .hazard-grid { grid-template-columns: 1fr; }
    .site-grid { grid-template-columns: 1fr; }
    .card-hero h2 { font-size: 18px; }
  }
</style>
</head>

const PASS_MARK = 75; // percent

// ─── STATE ─────────────────────────────────────────────────────────────────
let state = {
  screen: 'welcome',   // welcome | site | register | s0 | s1 | s2 | s3 | quiz | results
  site: null,
  learner: { name: '', job: '', dept: '' },
  quizAnswers: {},
  quizRevealed: {},
  emailStatus: 'idle', // idle | sending | sent | error
};

const SCREENS = ['welcome','site','register','s0','s1','s2','s3','quiz','results'];

function screenIndex() { return SCREENS.indexOf(state.screen); }
function totalScreens() { return SCREENS.length; }

function setScreen(s) {
  state.screen = s;
  render();
}

// ─── RENDER ─────────────────────────────────────────────────────────────────
function render() {
  const card = document.getElementById('appCard');
  const idx = screenIndex();
  const pct = Math.round((idx / (totalScreens() - 1)) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  const labels = ['Start','Site','Details','Why Spills Matter','Spill Types','Response Steps','Kit & Contacts','Assessment','Results'];
  document.getElementById('progressLabel').textContent = labels[idx] || '';

  const screens = {
    welcome: renderWelcome,
    site: renderSite,
    register: renderRegister,
    s0: renderS0,
    s1: renderS1,
    s2: renderS2,
    s3: renderS3,
    quiz: renderQuiz,
    results: renderResults,
  };
  card.innerHTML = (screens[state.screen] || (() => '<p>Unknown screen</p>'))();
  bindEvents();
}

function renderSite() {

function renderS2() {
  return `

      <div class="eyebrow">Section 3 — Response</div>
      <h2>How to Respond to a Spill</h2>
    </div>
    <div class="card-body">
      <div class="section-title">Follow these steps in order</div>
      <ol class="steps-list">
        <li class="step-item">
          <span class="step-num">1</span>
          <div class="step-content">
            <h4>Stop &amp; Assess — don't rush in</h4>
            <p>Pause before acting. Identify the substance if possible. Assess the size, spread, and any immediate hazards (vapour, fire risk, proximity to drains). Do not approach a hazardous spill without appropriate PPE.</p>
          </div>
        </li>
        <li class="step-item">
          <span class="step-num">2</span>
          <div class="step-content">
            <h4>Protect people</h4>
            <p>Alert others in the area. Keep people away from the spill zone. If the substance is volatile or the spill is large, evacuate the immediate area and notify your Responsible Person.</p>
          </div>
        </li>
        <li class="step-item">
          <span class="step-num">3</span>
          <div class="step-content">
            <h4>Prevent spread — contain first</h4>
            <p>Where safe to do so, use absorbent socks or booms to surround and contain the spill. Prevent the substance from reaching drains. Do not wash spills to drain.</p>
          </div>
        </li>
        <li class="step-item">
          <span class="step-num">4</span>
          <div class="step-content">
            <h4>Put on PPE, then clean up</h4>
            <p>Don appropriate PPE as specified in the relevant SDS (minimum: gloves and eye protection for chemical spills). Apply absorbent granules or pads, working from outside the spill inward. Collect contaminated material carefully.</p>
          </div>
        </li>
        <li class="step-item">
          <span class="step-num">5</span>
          <div class="step-content">
            <h4>Dispose of waste correctly</h4>
            <p>Place all contaminated absorbents and PPE in a sealed, clearly labelled bag or container. Dispose of as controlled waste — do not put in general bins. Your Responsible Person can advise on the correct waste stream.</p>
          </div>

          <span class="step-num">6</span>

            <p>All spills must be reported to your Responsible Person and logged via the <strong>Microsoft Forms incident reporting system</strong> (COP-6.0), however small. If the spill reaches a drain or watercourse, also contact the Environment Agency immediately: <strong>0800 80 70 60 (24hr)</strong>.</p>

function renderQuiz() {
  const allAnswered = QUIZ.every((_,i) => state.quizAnswers[i] !== undefined);
  const revealed = state.quizRevealed.done;
  return `
    <div class="card-hero">
      <div class="eyebrow">Knowledge Check</div>
      <h2>Spill Awareness Assessment</h2>
      <p>Answer all 8 questions. You need 75% or above to pass.</p>
    </div>
    <div class="card-body">
      ${QUIZ.map((q, qi) => {
        const chosen = state.quizAnswers[qi];
        const isRevealed = !!revealed;
        return `
          <div class="quiz-q">
            <div class="quiz-q-num">Question ${qi + 1} of ${QUIZ.length}</div>
            <div class="quiz-q-text">${q.q}</div>
            <div class="quiz-options">
              ${q.opts.map((opt, oi) => {
                let cls = 'quiz-opt';
                let radioCls = 'quiz-radio';
                if (chosen === oi) { cls += ' selected'; radioCls += ' filled'; }
                if (isRevealed) {
                  if (oi === q.correct) { cls = 'quiz-opt reveal-correct'; radioCls = 'quiz-radio correct-radio'; }
                  else if (chosen === oi && chosen !== q.correct) { cls = 'quiz-opt incorrect'; }
                }
                const disabled = isRevealed ? 'style="pointer-events:none"' : '';
                return `<div class="${cls}" ${disabled} onclick="answerQuiz(${qi},${oi})">
                  <span class="${radioCls}"></span>${opt}
                </div>`;
              }).join('')}
            </div>
            ${isRevealed ? `<div class="quiz-feedback ${chosen === q.correct ? 'correct' : 'incorrect'}">
              ${chosen === q.correct ? '✓ Correct — ' : '✗ Incorrect — '}${q.explain}
            </div>` : ''}
          </div>`;
      }).join('')}
      <div class="nav-row">
        <button class="btn btn-secondary" onclick="setScreen('s3')">← Back</button>
        ${!revealed
          ? `<button class="btn btn-primary" ${!allAnswered ? 'disabled' : ''} onclick="submitQuiz()">Submit Answers</button>`
          : `<button class="btn btn-success" onclick="setScreen('results')">View Results →</button>`
        }
      </div>
    </div>`;
}

function renderResults() {
  const total = QUIZ.length;
  const correct = QUIZ.filter((q, i) => state.quizAnswers[i] === q.correct).length;
  const pct = Math.round((correct / total) * 100);
  const pass = pct >= PASS_MARK;
  const now = new Date().toLocaleString('en-GB');
  const s = SITES[state.site];

  return `
    <div class="card-hero">
      <div class="eyebrow">Assessment Complete</div>
      <h2>${pass ? '🎉 Module Passed' : '📋 Module Not Passed'}</h2>
    </div>
    <div class="card-body">
      <div class="result-score-ring ${pass ? 'pass' : 'fail'}">
        <span class="score-pct">${pct}%</span>
        <span class="score-label">${correct}/${total}</span>
      </div>
      <div class="result-text">
        <h3>${pass ? 'Well done, ' + state.learner.name + '!' : 'Please review and retry'}</h3>
        <p>${pass
          ? 'You have completed Spill Awareness Induction Training. Your result has been submitted to the QHSE team.'
          : 'You scored below the 75% pass mark. Please review the training content and speak with your Responsible Person before retrying.'
        }</p>
      </div>
      <table class="info-table" style="margin-bottom:18px">
        <tr><td>Name</td><td>${state.learner.name}</td></tr>
        <tr><td>Job Title</td><td>${state.learner.job}</td></tr>
        <tr><td>Site</td><td>${s.label}</td></tr>
        <tr><td>Date / Time</td><td>${now}</td></tr>
        <tr><td>Score</td><td>${pct}% (${correct}/${total}) — <strong>${pass ? 'PASS' : 'FAIL'}</strong></td></tr>
      </table>
      <div class="result-breakdown">
        ${QUIZ.map((q, i) => {
          const ok = state.quizAnswers[i] === q.correct;
          return `<div class="result-row"><span class="rr-q">Q${i+1}: ${q.q.substring(0,60)}…</span><span class="rr-tick">${ok ? '✅' : '❌'}</span></div>`;
        }).join('')}
      </div>
      <div id="email-status-wrap">
        ${state.emailStatus === 'idle' ? `<button class="btn btn-primary" style="margin-top:20px;width:100%" onclick="sendEmail(${pct}, ${pass})">📧 Submit Result to QHSE Team</button>` : ''}
        ${state.emailStatus === 'sending' ? `<p class="status-msg sending">Sending result… please wait.</p>` : ''}
        ${state.emailStatus === 'sent' ? `<p class="status-msg sent">✅ Result sent to qhse@caswellsgroup.com</p>` : ''}
        ${state.emailStatus === 'error' ? `<p class="status-msg error">⚠️ Could not send automatically. Please screenshot this page and email qhse@caswellsgroup.com.</p>` : ''}
      </div>
      ${!pass ? `<div class="nav-row"><span></span><button class="btn btn-secondary" onclick="retryQuiz()">Retry Assessment</button></div>` : ''}
    </div>`;
}

// ─── EVENT HANDLERS ──────────────────────────────────────────────────────────
function bindEvents() {}

function selectSite(key) {
  state.site = key;
  render();
}

function updateLearner(field, val) {
  state.learner[field] = val;
  const btn = document.getElementById('reg-next');
  if (btn) btn.disabled = !(state.learner.name && state.learner.job);
}

function answerQuiz(qi, oi) {
  if (state.quizRevealed.done) return;
  state.quizAnswers[qi] = oi;
  render();
}

function submitQuiz() {
  state.quizRevealed.done = true;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function retryQuiz() {
  state.quizAnswers = {};
  state.quizRevealed = {};
  state.emailStatus = 'idle';
  setScreen('quiz');
}

async function sendEmail(pct, pass) {
  state.emailStatus = 'sending';
  render();

  const total = QUIZ.length;
  const correct = QUIZ.filter((q, i) => state.quizAnswers[i] === q.correct).length;
  const s = SITES[state.site];
  const now = new Date().toLocaleString('en-GB');

  const breakdown = QUIZ.map((q, i) => {
    const ok = state.quizAnswers[i] === q.correct;
    return `Q${i+1} [${ok ? 'PASS' : 'FAIL'}]: ${q.q}`;
  }).join('\n');

  try {
    emailjs.init(EMAILJS_PUBLIC_KEY);
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      to_email: 'qhse@caswellsgroup.com',
      module: 'Spill Awareness Induction',
      learner_name: state.learner.name,
      learner_job: state.learner.job,
      learner_dept: state.learner.dept || 'Not specified',
      site: s.label,
      score: `${pct}% (${correct}/${total})`,
      result: pass ? 'PASS' : 'FAIL',
      date: now,
      breakdown: breakdown,
    });
    state.emailStatus = 'sent';
  } catch(e) {
    console.error(e);
    state.emailStatus = 'error';
  }
  render();
}

// ─── INIT ────────────────────────────────────────────────────────────────────
render();
</script>
